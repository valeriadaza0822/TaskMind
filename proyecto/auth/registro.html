<!DOCTYPE html>
<html lang="es">
<head>

    <main class="auth-card">

        <h1>Crear cuenta</h1>

        <div class="auth-alert" id="registroAlert" hidden></div>

            <input type="email" name="correo" placeholder="Correo electrónico" required>
            <select name="institucion" required>

                    <option>Corporación Universitaria Minuto de Dios - UNIMINUTO</option>
                    <option>Corporación Unificada Nacional - CUN</option>
                    <option>Fundación Universidad de América</option>
                    <option>Universidad Konrad Lorenz</option>
                    <option>Universidad Central</option>
                    <option>Universidad La Gran Colombia</option>
                </optgroup>
                <optgroup label="UNIVERSIDADES - MEDELLÍN Y ANTIOQUIA">
                    <option>Universidad de Antioquia</option>
                    <option>EAFIT</option>
                    <option>Universidad Pontificia Bolivariana</option>
                    <option>Universidad de Medellín</option>
                    <option>Institución Universitaria Tecnológica de Antioquia</option>
                    <option>Universidad Autónoma Latinoamericana</option>
                    <option>Universidad Metropolitana</option>
                </optgroup>
                <optgroup label="UNIVERSIDADES - CALI Y VALLE">
                    <option>Universidad del Valle</option>
                    <option>Universidad ICESI</option>
                    <option>Universidad Autónoma de Occidente</option>
                    <option>Universidad Santiago de Cali</option>
                    <option>Corporación Universitaria Comfacauca</option>
                </optgroup>
                <optgroup label="UNIVERSIDADES - BUCARAMANGA Y SANTANDER">
                    <option>Universidad Industrial de Santander - UIS</option>
                    <option>Universidad Autónoma de Bucaramanga</option>
                    <option>Fundación Universidad del Norte</option>
                </optgroup>
                <optgroup label="UNIVERSIDADES - OTRAS CIUDADES">
                    <option>Universidad de Nariño - Pasto</option>

                    <option>Cesmag - Pasto</option>
                    <option>Universidad de la Amazonia - Florencia</option>
                    <option>Universidad del Quindío - Armenia</option>
                    <option>Universidad Tecnológica de Bolívar - Cartagena</option>
                    <option>Universidad de Córdoba - Montería</option>
                </optgroup>

                <optgroup label="COLEGIOS - MEDELLÍN">
                    <option>Colegio Madre Carmen Teresiano</option>
                    <option>Colegio Bolivariano de Medellín</option>
                    <option>Colegio Monserrate</option>

                    <option>Colegio Marymount</option>

                </optgroup>
                <optgroup label="COLEGIOS - CALI">
                    <option>Colegio Bolivariano de Cali</option>
                    <option>Colegio San José</option>

                    <option>Colegio Calasanz Cali</option>
                </optgroup>

                    <option>Colegio Colombo Francés</option>

                    <option>Colegio Americano Barranquilla</option>

            </select>
            <input type="password" name="password" placeholder="Contraseña: 6 a 8 números" minlength="6" maxlength="8" pattern="[0-9]{6,8}" inputmode="numeric" required>
            <input type="password" name="confirmPassword" placeholder="Confirmar contraseña" minlength="6" maxlength="8" pattern="[0-9]{6,8}" inputmode="numeric" required>
            <button type="submit">Registrarse</button>
        </form>

        <small>¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a></small>
    </main>
    <script>
        const params = new URLSearchParams(window.location.search);
        const error = params.get("error");
        const mensajes = {
            campos: "Completa todos los campos y confirma que las contraseñas sean iguales.",
            password: "La contraseña debe tener de 6 a 8 números.",
            existe: "Ya existe una cuenta con ese correo.",
            bd: "No se pudo crear la cuenta. Inténtalo de nuevo."
        };

        if (error && mensajes[error]) {
            const alert = document.getElementById("registroAlert");
            alert.textContent = mensajes[error];
            alert.hidden = false;
        }
    </script>
</body>
</html>
